baseURL = "https://trac3r00.github.io/ai-autopilot-blog/"
languageCode = "en-us"
title = "Field Notes"
theme = "PaperMod"
paginate = 10

[params]
  env = "production"
  description = "Measured notes on building reliable AI agents, computer use, and personal infrastructure."
  author = "Minseo"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  comments = false
  defaultTheme = "auto"

  [params.homeInfoParams]
    Title = "Field Notes"
    Content = "Verified notes from building reliable AI agents, computer use, and personal infrastructure. Every claim needs an experiment, a trace, or a source."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/trac3r00"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokai"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false
